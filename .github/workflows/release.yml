name: Release

# Fires on any tag matching v*. Local manual trigger also wired for
# dry-run testing (`workflow_dispatch`) — pushing a tag does the real
# work + creates the GH Release with all platform artifacts attached.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (manual trigger only, e.g. v0.1.0)"
        required: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Build the frontend bundle ONCE on a Linux runner, then publish
  # it as an artifact every platform job below downloads. Avoids
  # building the same Vite output 3x.
  # ────────────────────────────────────────────────────────────────
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # Per-platform native build. Each runner does cargo release-build
  # for its native target — much simpler than cross-compiling, and
  # GitHub Actions gives us a runner for each of the 3 targets free.
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both Mac targets share the macos-14 (arm64) runner. macos-13
          # (Intel) on free public repos has tiny capacity and routinely
          # queues for hours; cross-compiling x86_64 from the arm64 host
          # is well-supported by Apple's toolchain (just `rustup target
          # add` and `--target`) and ships the same binary in 1/10th the
          # wait time.
          - target: darwin-arm64
            runs-on: macos-14
            rust-target: aarch64-apple-darwin
            archive-ext: zip
          - target: darwin-x86_64
            runs-on: macos-14
            rust-target: x86_64-apple-darwin
            archive-ext: zip
          - target: linux-x86_64
            runs-on: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            archive-ext: tar.gz
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      # Ensure the requested Rust target is installed. Native is already
      # there for the runner's arch; cross targets (darwin x86_64 on the
      # arm64 host) need `rustup target add`.
      - name: Install Rust target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ matrix.rust-target }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.rust-target }}-

      # rust-embed reads from frontend/dist at compile time, so we MUST
      # land the prebuilt UI there before `cargo build` runs.
      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build release binary
        working-directory: rust
        run: cargo build --release --bin claw-server --target ${{ matrix.rust-target }}

      # Two archive formats: macOS users get a familiar .zip (Finder
      # double-click extracts it); Linux users get .tar.gz preserving
      # the +x bit reliably.
      - name: Stage archive
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then
            # workflow_dispatch path — tag input wasn't a v-prefixed ref
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          DIR="forge-v${VERSION}-${{ matrix.target }}"
          mkdir "${DIR}"
          # `--target` puts the binary under target/<triple>/release/ —
          # always source from there even for the host-arch build so the
          # path stays uniform across matrix entries.
          cp rust/target/${{ matrix.rust-target }}/release/claw-server "${DIR}/forge"
          chmod +x "${DIR}/forge"
          # Canonical end-user README that ships in every release zip.
          # Tracked at release-assets/README.txt so the workflow can rely
          # on it being present in any tag's checkout (vs. the .gitignored
          # local dist/ staging dir which only exists on the dev machine).
          cp release-assets/README.txt "${DIR}/README.txt"
          if [ "${{ matrix.archive-ext }}" = "zip" ]; then
            zip -r "${DIR}.zip" "${DIR}/"
          else
            tar -czf "${DIR}.tar.gz" "${DIR}/"
          fi
          echo "ARCHIVE=${DIR}.${{ matrix.archive-ext }}" >> $GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # Gather every platform's archive and attach them to a GH Release
  # under the triggering tag. Skipped on workflow_dispatch (manual
  # dry-runs shouldn't publish).
  # ────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and inspect
        run: |
          set -euxo pipefail
          # actions/download-artifact v4 puts each artifact in its own
          # subfolder named after the artifact name. Flatten so the
          # release-action sees a single dir of archives.
          mkdir -p release-assets
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create release + upload
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
